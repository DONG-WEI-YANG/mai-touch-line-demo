# Docker Compose Configuration
# 預留給未來真實主機部署使用

version: '3.8'

services:
  # Main Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NLP_SERVICE_URL=http://nlp-service:8000
      - NLP_SERVICE_ENABLED=true
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - db
      - nlp-service
    restart: unless-stopped
    networks:
      - mai-touch-network

  # NLP Microservice
  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POOL_SIZE=3
      - MAX_QUEUE_SIZE=100
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    networks:
      - mai-touch-network
    volumes:
      - nlp-models:/app/models/cache

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=mai_touch
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - mai-touch-network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - mai-touch-network
    volumes:
      - redis-data:/data

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - mai-touch-network

networks:
  mai-touch-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  nlp-models:

# NOTE: the LIVE LINE backend is now the Oregon service `mai-touch-line-us`
# (created via Render API, not this blueprint). Singapore's shared egress IP
# couldn't reach Google's Gemini endpoint (HTTP 400 on every call), so the
# backend was migrated to us-west. If recreating from a blueprint, use a US
# region — keep this file's `region: singapore` only for the legacy service.
services:
  - type: web
    name: mai-touch-demo
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && npm run db:init:demo
    startCommand: npm run server
    envVars:
      - key: DEPLOY_PROFILE
        value: demo
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_FILENAME
        value: ./data/mai-touch-demo.db
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_ID
        value: default
      # Gemini keys (AIzaSy…) + Google's OpenAI-compat endpoint. profile.ts
      # auto-swaps gpt-* model names to a Gemini model when it sees this combo,
      # but set the Gemini model explicitly so there's no ambiguity.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: OPENAI_MODEL
        value: gemini-flash-latest
      - key: OPENAI_TEMPERATURE
        value: "0.1"
      - key: BASE_URL
        value: https://mai-touch-demo.onrender.com
      - key: DEMO_ADMIN_LINE_USERS
        sync: false
      - key: LINE_RATE_LIMIT_PER_MIN
        value: "10"
      - key: LINE_RATE_LIMIT_PER_DAY
        value: "200"
      - key: DEMO_BANNER
        value: "true"
      # Render Free has 512MB total RAM. Default Node heap (~256MB) + ts-node
      # transpile overhead OOMs. Cap heap at 400MB to leave room for OS + other.
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
    # NOTE: Render Free tier does not support persistent disks.
    # SQLite lives on ephemeral storage — survives idle/wake restarts but is
    # wiped on every new deploy. buildCommand runs `db:init:demo` to recreate
    # the DB + seed users on each deploy (idempotent INSERT OR IGNORE).
    # To preserve booking history across deploys, upgrade to Starter ($7/mo)
    # and re-add the disk: block with mountPath /var/data plus update
    # SQLITE_FILENAME back to /var/data/mai-touch-demo.db.
    healthCheckPath: /health

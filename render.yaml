services:
  - type: web
    name: mai-touch-demo
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && npm run db:init:demo
    startCommand: npm run server
    envVars:
      - key: DEPLOY_PROFILE
        value: demo
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_FILENAME
        value: ./data/mai-touch-demo.db
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_ID
        value: default
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TEMPERATURE
        value: "0.1"
      - key: BASE_URL
        value: https://mai-touch-demo.onrender.com
      - key: DEMO_ADMIN_LINE_USERS
        sync: false
      - key: LINE_RATE_LIMIT_PER_MIN
        value: "10"
      - key: LINE_RATE_LIMIT_PER_DAY
        value: "200"
      - key: DEMO_BANNER
        value: "true"
    # NOTE: Render Free tier does not support persistent disks.
    # SQLite lives on ephemeral storage — survives idle/wake restarts but is
    # wiped on every new deploy. buildCommand runs `db:init:demo` to recreate
    # the DB + seed users on each deploy (idempotent INSERT OR IGNORE).
    # To preserve booking history across deploys, upgrade to Starter ($7/mo)
    # and re-add the disk: block with mountPath /var/data plus update
    # SQLITE_FILENAME back to /var/data/mai-touch-demo.db.
    healthCheckPath: /health
